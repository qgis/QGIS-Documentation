repos:

  - repo: local
    hooks:
      - id: tabs-to-spaces
        name: Convert tabs to spaces in RST files
        entry: bash -c 'for f in "$@"; do expand -t 3 "$f" > "$f.tmp" && mv "$f.tmp" "$f"; done' _
        language: system
        files: \.(rst)$
        exclude: ^(locale/|_dummy/|build/)

      - id: find_set_subst
        name: find_set_subst
        entry: ./scripts/find_set_subst.py
        language: system
        always_run: true
        pass_filenames: false

ci:
  autofix_prs: true
  autoupdate_schedule: quarterly
